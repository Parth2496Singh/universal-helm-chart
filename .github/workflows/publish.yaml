name: Publish Helm Chart to ECR
on:
  push:
    branches:
      - main
    paths:
      - 'Chart.yaml' # Only trigger if the chart version/metadata changes

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for AWS OIDC
      contents: read
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Package and Push Helm Chart
        run: |
          # Read the immutable version and name directly from Chart.yaml
          VERSION=$(grep '^version:' Chart.yaml | awk '{print $2}')
          CHART_NAME=$(grep '^name:' Chart.yaml | awk '{print $2}')
          
          echo "Packaging chart: $CHART_NAME version $VERSION"
          
          # Package the chart (outputs a .tgz file)
          helm package .
          
          # Push to ECR as an OCI artifact
          # This dynamically uses the exact name defined in your Chart.yaml
          helm push ${CHART_NAME}-${VERSION}.tgz oci://${{ steps.login-ecr.outputs.registry }}/universal-helm-chart
